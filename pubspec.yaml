name: pollo
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  equatable: ^2.0.5 
  flutter_bloc: ^8.1.3 # متوافقة مع Dart 3.3
  rename: ^3.0.2
  flutter_screenutil: ^5.9.0
  get_it: ^9.2.1
  flutter_svg: ^2.0.9
  shared_preferences: ^2.2.2
  #flutter_native_splash: ^2.4.7
  dio: ^5.4.1
  dartz: ^0.10.1
  #fluttertoast: ^8.2.4
  smooth_page_indicator: ^1.1.0
  dropdown_button2: ^2.3.9
  pinput: ^4.0.0
  pretty_dio_logger: ^1.3.1
  carousel_slider: ^5.1.2
  easy_localization: ^3.0.7
  gradient_borders: ^1.0.2
  icons_plus: ^4.0.0
  curved_navigation_bar: ^1.0.3
  flutter_rating_bar: ^4.0.1
  readmore: ^2.2.0
  dotted_border: 2.0.0+3 # دي أهم واحدة عشان الـ Error يختفي
  firebase_auth: ^5.0.0 # تأكد من استخدام أحدث إصدار
  google_sign_in: ^6.2.1 # دي المكتبة الناقصة
  flutter_facebook_auth: ^7.1.1 # عشان الفيسبوك
  json_annotation: ^4.9.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
 # flutter_launcher_icons: ^0.13.1
  flutter_lints: ^3.0.0

  build_runner: ^2.4.8
 # retrofit_generator: ^10.2.5
 # retrofit: ^4.9.2
  freezed: ^2.4.7
  freezed_annotation: ^2.4.1
  json_serializable: ^6.7.1
 # build_resolvers: ^2.4.2

flutter:
  uses-material-design: true

  assets:
    - assets/images/auth/
    - assets/images/
    - assets/images/home/
    - assets/images/onboarding/
    - assets/svgs/
    - assets/svgs/auth/
    - assets/svgs/home/
    - assets/translations/

  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/outfit/Outfit-Thin.ttf
          weight: 100
        - asset: assets/fonts/outfit/Outfit-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/outfit/Outfit-Light.ttf
          weight: 300
        - asset: assets/fonts/outfit/Outfit-Regular.ttf
          weight: 400
        - asset: assets/fonts/outfit/Outfit-Medium.ttf
          weight: 500
        - asset: assets/fonts/outfit/Outfit-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/outfit/Outfit-Bold.ttf
          weight: 700
        - asset: assets/fonts/outfit/Outfit-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/outfit/Outfit-Black.ttf
          weight: 900

    - family: Cairo
      fonts:
        - asset: assets/fonts/cairo/Cairo-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/cairo/Cairo-Light.ttf
          weight: 300
        - asset: assets/fonts/cairo/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/cairo/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/cairo/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/cairo/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/cairo/Cairo-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/cairo/Cairo-Black.ttf
          weight: 900